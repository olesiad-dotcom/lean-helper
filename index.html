<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Справочник QM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #f0f4f8;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 1rem;
        }
        .card {
            background: white;
            border: 2px solid #1e293b;
            box-shadow: 4px 4px 0 #0f172a;
            cursor: pointer;
            transition: 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 0 #1e3a8a;
            border-color: #1e3a8a;
        }
        .back-btn {
            background: #1e3a8a;
            color: white;
            padding: 0.5rem 1.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .back-btn:hover {
            background: #0f172a;
        }
        .detail {
            background: white;
            border: 2px solid #1e293b;
            padding: 2rem;
            box-shadow: 6px 6px 0 #0f172a;
        }
        /* Методы – светло-голубой фон */
        .method-item {
            background: #e0f2fe;
            border: 1px solid #bae6fd;
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
        }
        .method-item:hover {
            background: #bae6fd;
        }
        /* Документы – светло-бежевый фон */
        .doc-item {
            background: #fef3c7;
            border: 1px solid #fde68a;
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
        }
        .doc-item:hover {
            background: #fde68a;
        }
        .tab-btn {
            background: #e2e8f0;
            padding: 0.5rem 1.5rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #1e3a8a;
            color: white;
        }
        #search-input {
            border: 2px solid #cbd5e1;
            padding: 0.5rem 1rem;
            width: 100%;
            max-width: 300px;
        }
        .hidden-panel {
            display: none;
        }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl md:text-5xl font-bold text-indigo-800 tracking-wide mb-4">Справочник по управлению эффективностью и качеством</h1>

        <!-- Управление -->
        <div class="bg-white p-4 border-2 border-slate-200 mb-6">
            <div class="flex flex-wrap gap-2 mb-3">
                <button class="tab-btn active" data-tab="disciplines">📚 Дисциплины</button>
                <button class="tab-btn" data-tab="methods">🛠️ Методы</button>
                <button class="tab-btn" data-tab="documents">📄 Документы</button>
            </div>
            <div class="flex items-center gap-3">
                <input type="text" id="search-input" placeholder="Поиск...">
                <button id="reset-search" class="text-sm text-slate-500">✕</button>
                <div id="filter-panel" class="hidden-panel">
                    <select id="discipline-filter" class="border p-1">
                        <option value="all">Все</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Контейнер для карточек -->
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <!-- Контейнер для детального просмотра (скрыт) -->
        <div id="detail-container" style="display:none;"></div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
